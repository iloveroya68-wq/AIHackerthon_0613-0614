services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drift}
      POSTGRES_USER: ${POSTGRES_USER:-drift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drift_dev_pw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drift}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drift}:${POSTGRES_PASSWORD:-drift_dev_pw}@postgres:5432/${POSTGRES_DB:-drift}
      REDIS_URL: redis://redis:6379/0
      DRIFT_ENGINE: ${DRIFT_ENGINE:-mock}
      DRIFT_L2_ENGINE: ${DRIFT_L2_ENGINE:-opendrift}
      DRIFT_DATA_SOURCE: ${DRIFT_DATA_SOURCE:-forecast}
      DRIFT_DATA_ROOT: ${DRIFT_DATA_ROOT:-/data/modeling_inputs}
      DRIFT_FORECAST_PATH: ${DRIFT_FORECAST_PATH:-/tmp_data/forecast/merged_current_wind.nc}
      DRIFT_CSV_PATH: ${DRIFT_CSV_PATH:-/tmp_data/data/merged_wind_current.csv}
      DRIFT_LAND_MASK_PATH: ${DRIFT_LAND_MASK_PATH:-/data/modeling_inputs/processed/geo/land_mask.geojson}
      DRIFT_MODEL_PATH: ${DRIFT_MODEL_PATH:-/engine/artifacts/l3_correction.joblib}
      DRIFT_MODEL_METADATA_PATH: ${DRIFT_MODEL_METADATA_PATH:-/engine/artifacts/model_metadata.json}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./contracts:/contracts
      - ./engine:/engine
      - ${DRIFT_DATA_HOST_PATH:-./data/modeling_inputs}:/data/modeling_inputs:ro
      - ./rag_data:/rag_data:ro
      - ./.tmp:/tmp_data
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  postgres_data:
