name: DRIFT CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: contracts — schema generation + example validation
  # ─────────────────────────────────────────────────────────────
  contracts:
    name: Contracts · schema + examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install contract dependencies
        run: pip install pydantic==2.* jsonschema

      - name: Generate JSON Schemas
        run: python contracts/gen_schemas.py
        working-directory: ${{ github.workspace }}

      - name: Validate examples against schemas
        run: python contracts/gen_schemas.py --check
        working-directory: ${{ github.workspace }}

      - name: Check schemas are up-to-date (no uncommitted diff)
        run: |
          git diff --exit-code contracts/schemas/ || \
          (echo "::error::contracts/schemas/ is out of date. Run 'python contracts/gen_schemas.py' and commit." && exit 1)

  # ─────────────────────────────────────────────────────────────
  # JOB 2: backend — lint + tests
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend · lint + pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: drift_test
          POSTGRES_USER: drift
          POSTGRES_PASSWORD: drift_test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          pip install pydantic==2.* ruff pytest pytest-django
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Lint with ruff
        run: ruff check backend/ contracts/
        continue-on-error: false

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://drift:drift_test_pw@localhost:5432/drift_test
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "True"
        run: |
          if [ -f backend/manage.py ]; then
            cd backend && pytest --tb=short -q
          else
            echo "No Django app yet — skipping pytest (stub)"
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 3: frontend — lint + build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json yet — skipping (stub)"
          fi

      - name: Lint
        working-directory: frontend
        run: |
          if [ -f package.json ] && npm run lint --if-present 2>/dev/null; then
            echo "Lint passed"
          else
            echo "No lint script yet — skipping (stub)"
          fi

      - name: Build
        working-directory: frontend
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script yet — skipping (stub)"
          fi
